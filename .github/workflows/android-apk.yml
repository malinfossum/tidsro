name: Android APK

on:
  push:
    branches:
      - main
      - testing
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Tidsro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tidsro-apk
          path: Tidsro.apk

      - name: Publish APK to the android-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view android-latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create android-latest --repo "$GITHUB_REPOSITORY" \
              --title "Tidsro for Android (latest build)" \
              --notes "Always the newest APK. Download Tidsro.apk below, open it on your phone, and allow the install when asked."
          gh release edit android-latest --repo "$GITHUB_REPOSITORY" --prerelease=false --latest
          gh release upload android-latest Tidsro.apk --repo "$GITHUB_REPOSITORY" --clobber
