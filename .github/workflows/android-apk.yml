name: Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'android/**'
      - '.github/workflows/android-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build APK
        working-directory: android
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        run: cp android/app/build/outputs/apk/release/app-release.apk Tidsro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tidsro-apk
          path: Tidsro.apk
